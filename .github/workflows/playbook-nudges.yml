name: Trigger Playbook Nudges

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Call production nudge endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NUDGE_URL: https://daily-ops-board.vercel.app/api/cron/nudge
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret: CRON_SECRET"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$NUDGE_URL"
